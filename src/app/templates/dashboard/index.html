{% extends "base.html" %}

{% block title %}Dashboard - AI Native Compass{% endblock %}
{% block nav_dashboard %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h1>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
        <a href="/products" class="stat-card">
            <div class="stat-card-icon stat-icon-blue">
                <i class="bi bi-box-seam"></i>
            </div>
            <div class="stat-card-body">
                <div class="stat-card-value">--</div>
                <div class="stat-card-label">Products</div>
            </div>
        </a>
    </div>
    <div class="col-sm-6 col-xl-3">
        <a href="/repositories" class="stat-card">
            <div class="stat-card-icon stat-icon-teal">
                <i class="bi bi-code-square"></i>
            </div>
            <div class="stat-card-body">
                <div class="stat-card-value">--</div>
                <div class="stat-card-label">Repositories</div>
            </div>
        </a>
    </div>
    <div class="col-sm-6 col-xl-3">
        <a href="/templates" class="stat-card">
            <div class="stat-card-icon stat-icon-violet">
                <i class="bi bi-file-earmark-text"></i>
            </div>
            <div class="stat-card-body">
                <div class="stat-card-value">--</div>
                <div class="stat-card-label">Templates</div>
            </div>
        </a>
    </div>
    <div class="col-sm-6 col-xl-3">
        <a href="/teams" class="stat-card">
            <div class="stat-card-icon stat-icon-amber">
                <i class="bi bi-people"></i>
            </div>
            <div class="stat-card-body">
                <div class="stat-card-value">--</div>
                <div class="stat-card-label">Teams</div>
            </div>
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body empty-state">
        <i class="bi bi-compass"></i>
        <p class="mb-0">Welcome to AI Native Compass. Use the sidebar to navigate.</p>
    </div>
</div>
{% endblock %}
