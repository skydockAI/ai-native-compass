{% extends "base.html" %}

{% block title %}Users - AI Native Compass{% endblock %}
{% block nav_users %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-gear me-2 text-primary"></i>Users</h1>
    <a href="{{ url_for('users.create') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg me-1"></i>New User
    </a>
</div>

<!-- Filter bar -->
<div class="card mb-3">
    <div class="card-body py-2">
        <form id="user-filter-form"
              hx-get="{{ url_for('users.index') }}"
              hx-target="#user-list-content"
              hx-push-url="true"
              hx-trigger="change, submit"
              class="row g-2 align-items-end">
            <div class="col-sm-6 col-md-4">
                <label class="form-label small mb-1">Role</label>
                <select name="role" class="form-select form-select-sm">
                    <option value="">All Roles</option>
                    <option value="admin"{% if role_filter == 'admin' %} selected{% endif %}>Admin</option>
                    <option value="editor"{% if role_filter == 'editor' %} selected{% endif %}>Editor</option>
                    <option value="viewer"{% if role_filter == 'viewer' %} selected{% endif %}>Viewer</option>
                </select>
            </div>
            <div class="col-sm-6 col-md-4">
                <label class="form-label small mb-1">Status</label>
                <select name="archived" class="form-select form-select-sm">
                    <option value="0"{% if not show_archived %} selected{% endif %}>Active</option>
                    <option value="1"{% if show_archived %} selected{% endif %}>Archived</option>
                </select>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div id="user-list-content">
        {% include 'users/partials/user_list.html' %}
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function showConfirmModal(title, message, actionUrl) {
    document.getElementById('confirmModalLabel').textContent = title;
    document.getElementById('confirmModalBody').textContent = message;
    document.getElementById('confirmModalForm').action = actionUrl;
    var modal = new bootstrap.Modal(document.getElementById('confirmModal'));
    modal.show();
}
</script>
{% endblock %}
