{% extends "base.html" %}

{% block title %}Audit Log - AI Native Compass{% endblock %}
{% block nav_audit %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-journal-text me-2 text-primary"></i>Audit Log</h1>
</div>

<!-- Filter bar -->
<div class="card mb-3">
    <div class="card-body py-2">
        <form id="audit-filter-form"
              hx-get="{{ url_for('audit.index') }}"
              hx-target="#audit-list-content"
              hx-push-url="true"
              hx-trigger="change, submit"
              class="row g-2 align-items-end">
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">Entity Type</label>
                <select name="entity_type" class="form-select form-select-sm">
                    <option value="">All Types</option>
                    {% for et in entity_types %}
                    <option value="{{ et }}"{% if entity_type_filter == et %} selected{% endif %}>{{ et | title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">Action</label>
                <select name="action" class="form-select form-select-sm">
                    <option value="">All Actions</option>
                    {% for a in actions %}
                    <option value="{{ a }}"{% if action_filter == a %} selected{% endif %}>{{ a | replace('_', ' ') | title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">Actor</label>
                <select name="user_id" class="form-select form-select-sm">
                    <option value="">All Users</option>
                    {% for u in users %}
                    <option value="{{ u.id }}"{% if user_id_filter == u.id | string %} selected{% endif %}>{{ u.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">From</label>
                <input type="date" name="date_from" class="form-control form-control-sm" value="{{ date_from }}">
            </div>
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">To</label>
                <input type="date" name="date_to" class="form-control form-control-sm" value="{{ date_to }}">
            </div>
            <div class="col-sm-6 col-md-2">
                <label class="form-label small mb-1">Search</label>
                <input type="text" name="q" class="form-control form-control-sm"
                       placeholder="Search…" value="{{ q }}"
                       hx-trigger="keyup changed delay:400ms, change, submit">
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div id="audit-list-content">
        {% include 'audit/partials/audit_table.html' %}
    </div>
</div>
{% endblock %}
